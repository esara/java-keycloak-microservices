{{- if .Capabilities.APIVersions.Has "monitoring.coreos.com/v1" }}
{{/*apiVersion: monitoring.coreos.com/v1*/}}
{{/*kind: PodMonitor*/}}
{{/*metadata:*/}}
{{/*  name: keycloak-podmonitor*/}}
{{/*  labels:*/}}
{{/*    cnpg.io/cluster: keycloak*/}}
{{/*spec:*/}}
{{/*  podMetricsEndpoints:*/}}
{{/*    - port: metrics*/}}
{{/*  jobLabel: keycloak*/}}
{{/*  selector:*/}}
{{/*    matchLabels:*/}}
{{/*      cnpg.io/cluster: keycloak*/}}
{{/*      cnpg.io/podRole: instance*/}}
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: keycloak-servicemonitor
spec:
  endpoints:
    - port: 8080
      path: /q/metrics
  jobLabel: keycloak
  selector:
    matchLabels:
      prometheus-scrape: "true"
{{- end }}
